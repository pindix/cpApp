<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diluição | Mpindi TecMed</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    
    <!-- ================================================================== -->
    <!-- NAVEGAÇÃO SUPERIOR -->
    <!-- ================================================================== -->
    <nav class="nav-topo">
        <span class="nav-logo">Diluição</span>
        <button class="btn-hamburger" id="btnHamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>
    <!-- ================================================================== -->
    <!-- MENU OVERLAY (70% escuro) -->
    <!-- ================================================================== -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- ================================================================== -->
    <!-- MENU LATERAL (30% transparente à direita) -->
    <!-- ================================================================== -->
    <div class="menu-lateral" id="menuLateral">

        <!-- Cabeçalho do Menu -->
        <div class="menu-header">
            <div class="menu-header-icon">
                <i class="ri-heart-pulse-line"></i>
            </div>
            <h3>Mpindi TecMed</h3>
            <p>Suporte de Decisão Clínica</p>
        </div>

        <!-- Itens do Menu -->
        <div class="menu-items">
            <a href="../index.html" class="menu-item active" data-page="inicio">
                <div class="menu-item-icon">
                    <i class="ri-home-line"></i>
                </div>
                <span>Ferramentas</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="../sobre/index.html" class="menu-item" data-page="sobre">
                <div class="menu-item-icon">
                    <i class="ri-information-line"></i>
                </div>
                <span>Sobre</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>


            <a href="ajuda/index.html" class="menu-item" data-page="ajuda">
                <div class="menu-item-icon">
                    <i class="ri-question-line"></i>
                </div>
                <span>Como funciona</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="#" class="menu-item" data-page="contacto">
                <div class="menu-item-icon">
                    <i class="ri-mail-line"></i>
                </div>
                <span>Contacto</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>
        </div>
        <!-- Botão de Tema no Menu -->
        <div class="menu-item tema-toggle-menu" id="themeBtn"
            style="background: none; border: solid 1px white; color: white;">
            <div class="menu-item-icon">
                <i class="ri-moon-line" id="themeIcon"></i>
            </div>
            <span>Mudar Tema</span>
            <i class="ri-arrow-right-s-line menu-item-arrow"></i>
        </div>

        <!-- Rodapé do Menu -->
        <div class="menu-footer">
            <small>© 2026 Mpindi TecMed</small>
            <small>Versão 1.0.0</small>
        </div>
    </div>



    <section class="main-tool">

        <div class="calculator-box" data-aos="fade-up">

            <span class="nota-label">Apresentação do Frasco</span>
            <div class="campos-fundidos" id="caixa_mestre">
                <div class="sub-campo">
                    <input type="number" id="massa_valor" placeholder=" ">
                    <label>Massa</label>
                    <select id="massa_unidade" class="select-embutido">
                        <option value="mg">mg</option>
                        <option value="g">g</option>
                    </select>
                </div>
                <span class="divisor">/</span>
                <div class="sub-campo">
                    <input type="number" id="vol_valor" placeholder=" ">
                    <label>Capacidade</label>
                    <select id="vol_unidade" class="select-embutido">
                        <option value="ml">ml</option>
                        <option value="l">L</option>
                    </select>
                </div>
            </div>

            <div class="entradas_de_dados floating-group" style="margin-top: 20px;">
                <i class="ri-syringe-line"></i>
                <input type="number" id="dose_indicada" placeholder=" ">
                <label class="label-flutuante">Dose Indicada (Opcional)</label>
                <p id="label_unidade_dinamica">mg</p>
            </div>

            <div class="caxa_de_botoes">
                <button class="botao" onclick="calcularDiluicao()">Calcular</button>
                <div id="limpador" onclick="limparDiluicao()">
                    <i class="ri-delete-bin-line"></i>
                </div>
            </div>
        </div>

        <div class="resultado-display" id="resultado" data-aos="fade-up" style="display: none;"></div>
    </section>

    <footer class="plain-footer">
        <div class="footer-inline">
            <span>&copy; 2026 Mpindi TecMed</span>
            <span class="footer-sep">|</span>
            <a style="background: var(--white); border-radius: 12px; padding: 0.5rem 1rem; border-bottom: none;"
                href="../ajuda/index.html#diluicao" class="ri-question-line ajuda"></i> Ajuda</a>
        </div>
    </footer>


    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800 });</script>
    <script src="script.js"></script>
</body>

</html>
