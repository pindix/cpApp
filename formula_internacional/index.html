<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula Internacional | Mpindi TecMed</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>




    <!-- ================================================================== -->
    <!-- NAVEGAÇÃO SUPERIOR -->
    <!-- ================================================================== -->
    <nav class="nav-topo">
        <span class="nav-logo">Fórmula Internacional</span>
        <button class="btn-hamburger" id="btnHamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- ================================================================== -->
    <!-- MENU OVERLAY (70% escuro) -->
    <!-- ================================================================== -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- ================================================================== -->
    <!-- MENU LATERAL (30% transparente à direita) -->
    <!-- ================================================================== -->
    <div class="menu-lateral" id="menuLateral">

        <!-- Cabeçalho do Menu -->
        <div class="menu-header">
            <div class="menu-header-icon">
                <i class="ri-heart-pulse-line"></i>
            </div>
            <h3>Mpindi TecMed</h3>
            <p>Suporte de Decisão Clínica</p>
        </div>

        <!-- Itens do Menu -->
        <div class="menu-items">
            <a href="index.html" class="menu-item active" data-page="inicio">
                <div class="menu-item-icon">
                    <i class="ri-home-line"></i>
                </div>
                <span>Ferramentas</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="sobre/index.html" class="menu-item" data-page="sobre">
                <div class="menu-item-icon">
                    <i class="ri-information-line"></i>
                </div>
                <span>Sobre</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>


            <a href="ajuda/index.html" class="menu-item" data-page="ajuda">
                <div class="menu-item-icon">
                    <i class="ri-question-line"></i>
                </div>
                <span>Como funciona</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="#" class="menu-item" data-page="contacto">
                <div class="menu-item-icon">
                    <i class="ri-mail-line"></i>
                </div>
                <span>Contacto</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>
        </div>
        <!-- Botão de Tema no Menu -->
        <div class="menu-item tema-toggle-menu" id="themeBtn"  style="background: none; border: solid 1px white; color: white;">
            <div class="menu-item-icon">
                <i class="ri-moon-line" id="themeIcon"></i>
            </div>
            <span>Mudar Tema</span>
            <i class="ri-arrow-right-s-line menu-item-arrow"></i>
        </div>

        <!-- Rodapé do Menu -->
        <div class="menu-footer">
            <small>© 2026 Mpindi TecMed</small>
            <small>Versão 1.0.0</small>
        </div>
    </div>


    <section class="main-tool">


        <div class="calculator-box" data-aos="fade-up">
            
            <div class="container-campos">
                <div class="entradas_de_dados">
                <i class="ri-scales-2-fill"></i>
                <input type="number" placeholder="Peso..." id="peso">
                <p>kg</p>
            </div>
            <div class="entradas_de_dados">
                <i class="ri-capsule-line"></i>
                <input type="number" placeholder="Dosagem..." id="dosagem">
                <select id="unidade_de_dosagem">
                    <option value="1">mg/kg</option>
                    <option value="1000">kg</option>
                    <option value="1">mg</option>
                </select>
            </div>

            <div class="entradas_de_dados">
                <i class="ri-bubble-chart-line"></i>
                <input type="number" placeholder="Concentração..." id="concentracao">
                <select id="unidade_de_concentracao">
                    <option value="1">mg/ml</option>
                    <option value="1000">kg/ml</option>
                </select>
            </div>
            <div class="entradas_de_dados">
                <i class="ri-time-line"></i>
                <input type="number" placeholder="Intervalo..." id="intervalo">
                <p>horas</p>
            </div>
            </div>
            
            <div class="caxa_de_botoes">
                <button class="botao" onclick="calcular()">Calcular</button>
                <i class="ri-delete-bin-line" id="limpador" onclick="limpar()"></i>
            </div>
        </div>

        <p class="resultado-display" id="resultado" data-aos="fade-up" data-aos-delay="100"></p>
    </section>

    <footer class="plain-footer">
        <div class="footer-inline">
            <span>&copy; 2026 Mpindi TecMed</span>
            <span class="footer-sep">|</span>
            <a style="background: var(--white); border-radius: 12px; padding: 0.5rem 1rem; border-bottom: none;"
                href="../ajuda/index.html#internacional" class="ri-question-line ajuda"></i> Ajuda</a>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>
</body>
</html>
