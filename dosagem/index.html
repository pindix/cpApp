    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVEGAÇÃO SUPERIOR -->
    <!-- ================================================================== -->

        <span class="nav-logo">Calculo de Dosagem</span>
        <button class="btn-hamburger" id="btnHamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- ================================================================== -->
    <!-- MENU OVERLAY (70% escuro) -->
    <!-- ================================================================== -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- ================================================================== -->
    <!-- MENU LATERAL (30% transparente à direita) -->
    <!-- ================================================================== -->
    <div class="menu-lateral" id="menuLateral">

        <!-- Cabeçalho do Menu -->
        <div class="menu-header">
            <div class="menu-header-icon">
                <i class="ri-heart-pulse-line"></i>
            </div>
            <h3>Mpindi TecMed</h3>
            <p>Suporte de Decisão Clínica</p>
        </div>

        <!-- Itens do Menu -->
        <div class="menu-items">
            <a href="../index.html" class="menu-item active" data-page="inicio">
                <div class="menu-item-icon">
                    <i class="ri-home-line"></i>
                </div>
                <span>Ferramentas</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="../sobre/index.html" class="menu-item" data-page="sobre">
                <div class="menu-item-icon">
                    <i class="ri-information-line"></i>
                </div>
                <span>Sobre</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>


            <a href="ajuda/index.html" class="menu-item" data-page="ajuda">
                <div class="menu-item-icon">
                    <i class="ri-question-line"></i>
                </div>
                <span>Como funciona</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>

            <a href="#" class="menu-item" data-page="contacto">
                <div class="menu-item-icon">
                    <i class="ri-mail-line"></i>
                </div>
                <span>Contacto</span>
                <i class="ri-arrow-right-s-line menu-item-arrow"></i>
            </a>
        </div>
        <!-- Botão de Tema no Menu -->
        <div class="menu-item tema-toggle-menu" id="themeBtn"  style="background: none; border: solid 1px white; color: white;">
            <div class="menu-item-icon">
                <i class="ri-moon-line" id="themeIcon"></i>
            </div>
            <span>Mudar Tema</span>
            <i class="ri-arrow-right-s-line menu-item-arrow"></i>
        </div>

        <!-- Rodapé do Menu -->
        <div class="menu-footer">
            <small>© 2026 Mpindi TecMed</small>
            <small>Versão 1.0.0</small>
        </div>
    </div>


    <section class="main-tool">
        <select id="pais">
            <option value="msf" disabled selected>Que padrão vai usar?</option>
            <option value="msf">Médicos Sem Fronteira</option>
            <option>OMS (não disponível)</option>
            <option disabled>Novos padrões brevemente</option>
        </select>
        <div class="calculator-box" data-aos="fade-up">

            <div class="nomeConcentracao">
                <div class="entradas_de_dados" id="campo_nome">
                    <i class="ri-medicine-bottle-fill"></i>
                    <input type="text" placeholder="Medicamento..." id="nome" autocomplete="off">
                    <div id="sugestoes_box"></div>
                </div>
                <select id="selConcentracao">
                    <option></option>
                </select>
            </div>

            <div class="container-campos">
                <div class="entradas_de_dados" id="campo_de_peso">
                    <i class="ri-scales-2-fill"></i>
                    <input type="number" placeholder="Peso..." id="peso">
                    <p>kg</p>
                </div>
                <div class="entradas_de_dados" id="campo_de_idade">
                    <i class="ri-user-heart-line"></i>
                    <input type="number" placeholder="Idade..." id="idade">
                    <select id="unidade_de_idade">
                        <option value="365">anos</option>
                        <option value="30">meses</option>
                        <option value="7">semanas</option>
                        <option value="1">dias</option>
                    </select>
                </div>
                <div class="entradas_de_dados" id="campo_de_dosagem">
                    <i class="ri-capsule-line"></i>
                    <input type="number" placeholder="Dosagem..." id="dosagem">
                    <p id="unidade_de_dosagem">mg/kg</p>
                </div>
            </div>

            <div class="container-campos" style="grid-template-columns: repeat(4, 1fr);
">

                <select id="intervalo"></select>
                <select id="via">
                    <option value="iv">IV</option>
                    <option value="im">IM</option>
                </select>

                <select id="dose" style="grid-column: span 2;">
                    <option value="pediatrica">Dose Pediátrica</option>
                    <option value="adulta">Dose Adulta</option>
                </select>
                <select id="selDoenca" style="grid-column: span 2;"></select>
            </div>

            <div class="caxa_de_botoes">
                <button class="botao" onclick="calcular()">Calcular</button>
                <i class="ri-delete-bin-line" id="limpador" onclick="limpar()"></i>
            </div>
        </div>

        <div class="resultado-display" id="resultado" data-aos="fade-up" data-aos-delay="100"></div>
    </section>



    <div id="meuModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>⚠️ Sistema de Segurança</h3>
            <p id="modalMensagem"></p>
            <button onclick="fecharModal()">Entendido</button>
        </div>
    </div>


    <footer class="plain-footer">
        <div class="footer-inline">
            <span>&copy; 2026 Mpindi TecMed</span>
            <span class="footer-sep">|</span>
            <a style="background: var(--white); border-radius: 12px; padding: 0.5rem 1rem; border-bottom: none;" href="../ajuda/index.html#dosagem" class="ri-question-line ajuda"></i> Ajuda</a>
            <!-- Link condicional para "Sugerir Medicamento" -->
            <span class="footer-sep">|</span>
            <a href="https://wa.me/244929129797?text=Olá!%20Gostaria%20de%20sugerir%20um%20medicamento" target="_blank"
                rel="noopener">Sugerir Medicamento</a>
        </div>
    </footer>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>

</html>
